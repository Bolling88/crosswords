name: crosswords_web
description: Crosswords — lean in-browser puzzle player.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.3
  firebase_core: ^3.8.0
  crossword_auth:
