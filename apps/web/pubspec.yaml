  crossword_core:
    path: ../../packages/crossword_core
  crossword_ui:
    path: ../../packages/crossword_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
