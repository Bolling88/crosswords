name: crossword_auth
description: Firebase auth identity + shared login UI for the Crosswords apps.
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ^3.11.5

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  google_sign_in: ^7.0.0
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.6
  crossword_ui:
    path: ../crossword_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
