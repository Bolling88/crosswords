name: crossword_ui
description: Shared crossword play engine — grid widgets, cubit, theme, CrosswordPlayer.
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  crossword_core:
    path: ../crossword_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
